on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  test:
    strategy:
        matrix:
            task:
                - 2
                - 3
                - 4
                - 5
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - name: Build
        run: clang++ src/${{ matrix.task }}/solution.cpp tests/${{ matrix.task }}/tests.cpp -o test.out
      - name: Run public tests
        env:
            SAVE_SCORE_DB: ~/score.db
        run: python3 tests/run_tests.py test.out "${{ github.event.pull_request.user.login }}" ${{ matrix.task }}
